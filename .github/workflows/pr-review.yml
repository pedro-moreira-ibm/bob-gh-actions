name: "PR Review"

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.BOBSHELL_NODE_VERSION || '22' }}

      - name: "Download bob-action from default branch"
        run: |
          mkdir -p .github/actions/bob-action
          curl \
            --retry 3 \
            --retry-max-time 60 \
            -L -s \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            -o .github/actions/bob-action/action.yml \
            "${API_URL}/repos/${REPOSITORY}/contents/.github/actions/bob-action/action.yml?ref=${DEFAULT_BRANCH}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_URL: ${{ github.api_url }}
          REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

      - name: "Download commands from default branch"
        run: |
          mkdir -p .github/commands
          curl --retry 3 --retry-max-time 60 -L -s -f \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            -o ".github/commands/bob-review.toml" \
            "${API_URL}/repos/${REPOSITORY}/contents/.github/commands/bob-review.toml?ref=${DEFAULT_BRANCH}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_URL: ${{ github.api_url }}
          REPOSITORY: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

      - name: "Download and install GitHub MCP server"
        run: |
          curl \
            --retry 3 \
            --retry-max-time 60 \
            -L -s --fail \
            -o github-mcp-server.tar.gz https://github.com/github/github-mcp-server/releases/download/v0.20.1/github-mcp-server_Linux_x86_64.tar.gz
          tar -xzf github-mcp-server.tar.gz
          chmod +x ./github-mcp-server
          rm github-mcp-server.tar.gz

      - name: "Run Bob PR review"
        uses: ./.github/actions/bob-action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        with:
          bobshell_api_key: ${{ secrets.BOBSHELL_API_KEY }}
          bobshell_version: ${{ vars.BOBSHELL_VERSION || 'latest' }}
          bobshell_debug: ${{ fromJSON(vars.DEBUG || 'false') }}
          prompt: "/bob-review"
          mcp: |-
            {
              "mcpServers": {
                "github": {
                  "command": "./github-mcp-server",
                  "args": ["stdio"],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}",
                    "GITHUB_HOST": "https://github.com"
                  }
                }
              }
            }
